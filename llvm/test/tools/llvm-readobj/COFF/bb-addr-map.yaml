## This test checks how we handle the --bb-addr-map option for COFF objects.

# RUN: yaml2obj %s -o %t.obj
# RUN: llvm-readobj %t.obj --bb-addr-map | FileCheck %s --check-prefix=CHECK

# CHECK:      BBAddrMap [
# CHECK-NEXT:   Function {
# CHECK-NEXT:     At: 0x0
# CHECK-NEXT:     Name: bar
# CHECK-NEXT:     BB Ranges [
# CHECK-NEXT:       {
# CHECK-NEXT:         Base Address: 0x0
# CHECK-NEXT:         BB Entries [
# CHECK-NEXT:           {
# CHECK-NEXT:             ID: 0
# CHECK-NEXT:             Offset: 0x0
# CHECK-NEXT:             Size: 0x4
# CHECK-NEXT:             HasReturn: Yes
# CHECK-NEXT:             HasTailCall: No
# CHECK-NEXT:             IsEHPad: No
# CHECK-NEXT:             CanFallThrough: No
# CHECK-NEXT:             HasIndirectBranch: No
# CHECK:      BBAddrMap [
# CHECK-NEXT:   Function {
# CHECK-NEXT:     At: 0x0
# CHECK-NEXT:     Name: foo
# CHECK-NEXT:     BB Ranges [
# CHECK-NEXT:       {
# CHECK-NEXT:         Base Address: 0x0
# CHECK-NEXT:         BB Entries [
# CHECK-NEXT:           {
# CHECK-NEXT:             ID: 0
# CHECK-NEXT:             Offset: 0x0
# CHECK-NEXT:             Size: 0x4
# CHECK-NEXT:             HasReturn: Yes
# CHECK-NEXT:             HasTailCall: No
# CHECK-NEXT:             IsEHPad: No
# CHECK-NEXT:             CanFallThrough: No
# CHECK-NEXT:             HasIndirectBranch: No

