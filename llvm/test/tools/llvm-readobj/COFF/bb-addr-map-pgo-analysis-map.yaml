## This test checks how llvm-readobj prints the PGO Analysis Map with the
## --bb-addr-map option for COFF objects.

# RUN: yaml2obj %s -o %t.obj
# RUN: llvm-readobj %t.obj --bb-addr-map | FileCheck %s --check-prefixes=CHECK,RAW
# RUN: llvm-readobj %t.obj --bb-addr-map --pretty-pgo-analysis-map | FileCheck %s --check-prefixes=CHECK,PRETTY

# CHECK:      BBAddrMap [
# CHECK:        Name: bar
# CHECK:        BB Ranges [
# CHECK:          {
# CHECK-NEXT:       Base Address: 0x0
# CHECK-NEXT:       BB Entries [
# CHECK-NEXT:         {
# CHECK-NEXT:           ID: 0
# CHECK-NEXT:           Offset: 0x0
# CHECK-NEXT:           Size: 0x4
# CHECK-NEXT:           HasReturn: No
# CHECK-NEXT:           HasTailCall: No
# CHECK-NEXT:           IsEHPad: No
# CHECK-NEXT:           CanFallThrough: Yes
# CHECK-NEXT:           HasIndirectBranch: No
# CHECK:              {
# CHECK-NEXT:           ID: 1
# CHECK-NEXT:           Offset: 0x4
# CHECK-NEXT:           Size: 0x3
# CHECK:              {
# CHECK-NEXT:           ID: 2
# CHECK-NEXT:           Offset: 0x7
# CHECK-NEXT:           Size: 0x6
# CHECK:        PGO analyses {
# CHECK-NEXT:     FuncEntryCount: 100
# CHECK:          PGO BB entries [
# CHECK:            {
# RAW:                Frequency: 18014398509481984
# PRETTY:             Frequency: 1.0
# CHECK:              Successors [
# CHECK:                {
# CHECK-NEXT:             ID: 1
# RAW-NEXT:               Probability: 0x66666666
# PRETTY-NEXT:            Probability: 0x66666666 / 0x80000000 = 80.00%
# CHECK:                {
# CHECK-NEXT:             ID: 2
# RAW-NEXT:               Probability: 0x1999999A
# PRETTY-NEXT:            Probability: 0x1999999a / 0x80000000 = 20.00%
